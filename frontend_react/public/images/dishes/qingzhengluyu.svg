<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#15AABF" rx="12"/>
  <rect x="20" y="20" width="360" height="260" fill="rgba(255,255,255,0.15)" rx="8"/>
  <!-- Plate circle -->
  <circle cx="200" cy="140" r="80" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
  <!-- Food icon (fork & knife) -->
  <text x="200" y="115" text-anchor="middle" font-size="40" fill="white" opacity="0.6">🍽️</text>
  <!-- Dish name -->
  <text x="200" y="210" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="white">清蒸鲈鱼</text>
  <text x="200" y="240" text-anchor="middle" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.7)">浙大食堂</text>
</svg>