<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9775FA"/>
      <stop offset="100%" style="stop-color:#845EF7"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>

  <!-- 装饰圆 -->
  <circle cx="320" cy="60" r="80" fill="rgba(255,255,255,0.1)"/>
  <circle cx="80" cy="240" r="60" fill="rgba(255,255,255,0.08)"/>

  <!-- 食物 emoji -->
  <text x="200" y="100" text-anchor="middle" font-size="64">🥩</text>

  <!-- 菜品名称 -->
  <text x="200" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="white">红烧排骨</text>

  <!-- 价格和卡路里 -->
  <text x="200" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.9)">¥14.0 · 500kcal</text>

  <!-- 标签背景 -->
  <rect x="100" y="215" width="200" height="28" rx="14" fill="rgba(255,255,255,0.2)"/>

  <!-- 标签文字 -->
  <text x="200" y="234" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">荤 · 高蛋白 · 传统</text>

  <!-- 营养标签 -->
  
</svg>